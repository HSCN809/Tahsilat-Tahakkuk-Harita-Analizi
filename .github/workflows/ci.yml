name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "Tahsilat Tahakkuk Harita Analizi"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ../requirements-dev.txt
      - name: Run tests
        env:
          SCRAPE_TOKEN: ci-test-token
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: Install
        run: npm ci --legacy-peer-deps
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate prod compose
        run: docker compose -f docker-compose.prod.yml config --quiet
