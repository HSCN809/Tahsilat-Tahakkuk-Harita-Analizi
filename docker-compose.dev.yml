services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - backend_venv:/app/venv
      - frontend_node_modules:/app/frontend/node_modules
    environment:
      - PYTHONUNBUFFERED=1
      - SCRAPE_TOKEN=${SCRAPE_TOKEN:-dev-token}
      # CORS izin verilen origin'ler (virgülle ayrılmış). Üretimde domain'inizi ekleyin.
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:8000,http://127.0.0.1:5173

  frontend:
    build:
      context: ./frontend
      dockerfile: frontend.Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  backend_venv:
  frontend_node_modules:
