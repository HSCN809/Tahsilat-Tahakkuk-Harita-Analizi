# Üretim / Railway-referans Compose yapılandırması
# Kullanım:
#   cp .env.prod.example .env.prod   # değerleri doldur
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Geliştirme ortamı için: docker-compose.dev.yml

services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    # DİKKAT: 8080 portu host'a AÇILMIYOR. Yalnızca internal ağ üzerinden
    # nginx (frontend) ve scraper erişebilir.
    expose:
      - "8080"
    environment:
      - PYTHONUNBUFFERED=1
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - SCRAPE_TOKEN=${SCRAPE_TOKEN}
      - BACKUP_DIR=/backups
      - WORKERS=${BACKEND_WORKERS:-1}
    volumes:
      - veriler_named:/app/veriler
      - veriler_backup_named:/backups
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - appnet

  frontend:
    build:
      context: ./frontend
      dockerfile: frontend.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - appnet

  # NOT: Bu servis Railway production'da KULLANILMAZ; yalnızca yerel/manuel
  # docker compose testleri için burada tanımlıdır. Railway'de scraping işlemi
  # için backend'in /api/scrape endpoint'ini kullanın (tek servis, tek volume).
  scraper:
    build:
      context: .
      dockerfile: scraper.Dockerfile
    profiles:
      - manual
    environment:
      - SCRAPE_YEARS=${SCRAPE_YEARS:-hepsi}
      - PYTHONUNBUFFERED=1
    volumes:
      - veriler_named:/app/veriler
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    networks:
      - appnet

volumes:
  veriler_named:
  veriler_backup_named:

networks:
  appnet:
    driver: bridge
