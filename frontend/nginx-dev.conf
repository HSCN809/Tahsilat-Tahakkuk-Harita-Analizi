# Development ortamı için nginx yapılandırması
# Bu dosya docker-compose.dev.yml ile kullanılır

# Backend upstream tanımı - nginx başlangıçta DNS çözer
upstream backend_upstream {
    server backend:8000;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip sıkıştırma
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Sağlık kontrolü
    location /health {
        access_log off;
        return 200 "ok";
    }

    location /healthz {
        access_log off;
        return 200 "ok";
    }

    # SPA için tüm route'ları index.html'e yönlendir
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api isteklerini backend'e proxy et (dev ortamında backend:8000)
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Statik varlıklar için önbellek
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Güvenlik header'ları (dev ortamında HSTS kapalı)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}