# Rate limiting zones (http context seviyesinde tanımlanır;
# conf.d/*.conf dosyaları ana nginx.conf http bloğu içine include edilir)
limit_req_zone $binary_remote_addr zone=scrape_limit:10m rate=1r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip sıkıştırma
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Sağlık kontrolü (Docker / Railway için)
    location /healthz {
        access_log off;
        return 200 "ok";
    }

    # SPA için tüm route'ları index.html'e yönlendir
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api/scrape — sıkı rate limit (dakikada 1 istek, burst 1)
    location /api/scrape {
        limit_req zone=scrape_limit burst=1 nodelay;
        limit_req_status 429;
        resolver [fd12::10] ipv6=on valid=1s;
        set $backend_endpoint http://backend.railway.internal:8080;
        proxy_pass $backend_endpoint;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /api isteklerini backend'e proxy et
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        resolver [fd12::10] ipv6=on valid=1s;
        set $backend_endpoint http://backend.railway.internal:8080;
        proxy_pass $backend_endpoint;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Statik varlıklar için uzun süreli önbellek (Vite hash'li dosya adları)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Güvenlik header'ları
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HSTS: Tarayıcılara yalnızca HTTPS kullanmasını söyler (Railway edge'de TLS terminate edilir).
    # max-age=1 yıl, subdomain'leri de kapsar.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # CSP: Kaynak kısıtlama politikası.
    # style-src 'unsafe-inline': react-simple-maps (d3) SVG inline stiller için gereklidir.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
}
