# Railway yapılandırması — YALNIZCA backend servisi için geçerlidir.
#
# Bu dosya repo kökünde bulunduğu için Railway tarafından otomatik algılanır.
# Ancak yalnızca TEK bir servisi (backend) tanımlar.
#
# Frontend servisi Railway Dashboard üzerinden MANUEL olarak oluşturulmalıdır:
#   - Frontend: frontend/frontend.Dockerfile kullanan ayrı bir servis
#
# Scraping işlemi Railway production'da backend'in /api/scrape endpoint'i
# üzerinden önerilir (ayrı bir scraper servisi gerekmez).
# scraper.Dockerfile yalnızca yerel/manuel docker compose kullanımı içindir.
#
# Her servis için ortam değişkenleri Railway Dashboard > Servis > Variables
# sekmesinden tanımlanmalıdır (.env.prod.example referans alınabilir).

[build]
builder = "DOCKERFILE"

[deploy]
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
